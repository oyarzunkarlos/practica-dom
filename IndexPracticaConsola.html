<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reparadora de Calzados - Carrito</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>👟 Reparadora de Calzados</h1>
    
    <div id="lista-productos">
        <!-- Los productos se generan con JS -->
    </div>

    <div id="carrito">
        <h2>🛒 Carrito de Compras</h2>
        <div id="items-carrito">
            <p>El carrito está vacío</p>
        </div>
        <div id="total">Total: $0</div>
        <div class="controls">
            <button id="vaciar-carrito">Vaciar Carrito</button>
            <button id="comprar">Comprar</button>
        </div>
    </div>

    <script>
        // === DATOS ===
        const productos = [
            { id: 1, nombre: "Reparación de Zapatos", precio: 15000 },
            { id: 2, nombre: "Cambio de Suela", precio: 25000 },
            { id: 3, nombre: "Limpieza Profunda", precio: 12000 },
            { id: 4, nombre: "Impermeabilizado", precio: 18000 },
            { id: 5, nombre: "Cambio de Tacón", precio: 20000 }
        ];

        let carrito = [];

        // === RENDERIZAR PRODUCTOS ===
        function renderProductos() {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            
            productos.forEach(prod => {
                const div = document.createElement('div');
                div.className = 'producto';
                div.innerHTML = `
                    <div>
                        <h3>${prod.nombre}</h3>
                        <span class="precio">$${prod.precio.toLocaleString()}</span>
                    </div>
                    <button onclick="agregarAlCarrito(${prod.id})">Agregar</button>
                `;
                contenedor.appendChild(div);
            });
        }

        // === AGREGAR AL CARRITO ===
        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            carrito.push(producto);
            renderCarrito();
        }

        // === RENDER CARRITO ===
        function renderCarrito() {
const contenedor = document.getElementById('items-carrito');
            const totalDiv = document.getElementById('total');
            
            if (carrito.length === 0) {
                contenedor.innerHTML = '<p>El carrito está vacío</p>';
                totalDiv.textContent = 'Total: $0';
                return;
            }

            contenedor.innerHTML = '';
            let total = 0;

            carrito.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'carrito-item';
                div.innerHTML = `
                    <span>${item.nombre}</span>
                    <div>
                        <span>$${item.precio.toLocaleString()}</span>
                        <button class="eliminar" onclick="eliminarDelCarrito(${index})">×</button>
                    </div>
                `;
                contenedor.appendChild(div);
                total += item.precio;
            });

            totalDiv.textContent = `Total: $${total.toLocaleString()}`;
        }

        // === ELIMINAR DEL CARRITO ===
        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            renderCarrito();
        }

        // === VACIAR CARRITO ===
        document.getElementById('vaciar-carrito').addEventListener('click', () => {
            carrito = [];
            renderCarrito();
        });

        // === BOTÓN COMPRAR ===
        document.getElementById('comprar').addEventListener('click', () => {
            if (carrito.length === 0) {
                alert('El carrito está vacío');
                return;
            }
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            alert(`✅ Compra realizada!\nTotal: $${total.toLocaleString()}\nProductos: ${carrito.length}`);
            carrito = [];
            renderCarrito();
        });

        // === INICIALIZAR ===
        renderProductos();
    </script>
</body>
</html>
